services:
  otelcol:
    image: otel/opentelemetry-collector-contrib:0.103.0
    container_name: openobserve-otelcol
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./config/otelcol/config.yaml:/etc/otelcol/config.yaml:ro
    env_file:
      - .env
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"
      - "8889:8889"
    networks:
      - observability
    depends_on:
      - openobserve
      - prometheus
    restart: unless-stopped

  aspire:
    image: mcr.microsoft.com/dotnet/nightly/aspire-dashboard:latest
    container_name: openobserve-aspire
    ports:
      - "${ASPIRE_UI_PORT:-18888}:18888"
      - "${ASPIRE_OTLP_PORT:-18889}:18889"
    environment:
      - DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS=true
      - DOTNET_DASHBOARD_OTLP_ENDPOINT_URL=http://0.0.0.0:18889
    networks:
      - observability
    restart: unless-stopped

  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    container_name: openobserve-oo
    environment:
      - ZO_ROOT_USER_EMAIL=${OO_ADMIN_EMAIL:-admin@demo.local}
      - ZO_ROOT_USER_PASSWORD=${OO_ADMIN_PASSWORD:-Admin1234!}
      - ZO_DATA_DIR=/data
    volumes:
      - ./docker_data/openobserve:/data
    ports:
      - "${OO_HTTP_PORT:-5080}:5080"
    networks:
      - observability
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: openobserve-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker_data/prometheus:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - observability
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: openobserve-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker_data/grafana:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - observability
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  observability:
    name: openobserve_network
    driver: bridge
