

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  debug:
    verbosity: normal #basic, normal, detailed
  
  otlphttp/openobserve:
    endpoint: "http://openobserve:5080/api/default"
    headers:
      Authorization: Basic cm9vdEBleGFtcGxlLmNvbTozdm5VZmZIbmlmTENGZEZ4


processors:
  resource: #transform https://opentelemetry.io/docs/collector/transforming-telemetry/
    attributes:
      - key: parent.id
        from_attribute: ParentId
        action: insert
      - key: span.kind
        from_attribute: Span.kind
        action: insert
      - key: id
        from_attribute: SpanId
        action: insert

  batch:
    timeout: 10s
    send_batch_size: 10000
    send_batch_max_size: 11000
  memory_limiter:
    check_interval: 1s
    limit_mib: 4000
    spike_limit_mib: 800

service:
  #extensions: [health_check]
  telemetry:
    logs:
      level: "info"  #debug, info,warn,error   
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: '0.0.0.0'
                port: 8888
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlphttp/openobserve] 
    logs:
      receivers: [otlp]
      processors: [resource, batch] 
      exporters: [otlphttp/openobserve] 
    metrics:
      receivers: [otlp]
      processors: [resource,  batch] 
      exporters: [otlphttp/openobserve]