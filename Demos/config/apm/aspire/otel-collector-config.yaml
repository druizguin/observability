

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  debug:
    verbosity: normal #basic, normal, detailed
  
  otlp/aspire:
    endpoint: "aspiredashboard:18889" #GRPC
    tls:
      insecure: true

  otlphttp/openobserve:
    endpoint: "http://openobserve:5080/api/default"
    headers:
      Authorization: Basic cm9vdEBleGFtcGxlLmNvbTozdm5VZmZIbmlmTENGZEZ4


processors:
  resource: #transform https://opentelemetry.io/docs/collector/transforming-telemetry/
    attributes:
      - key: parent.id
        from_attribute: ParentId
        action: insert
      - key: span.kind
        from_attribute: Span.kind
        action: insert
      - key: id
        from_attribute: SpanId
        action: insert

      # - action: delete
      #   key: "telemetry.sdk.version"
      # - action: delete
      #   key: "telemetry.sdk.name"
      # - action: insert
      #   key: "serviceid"
      #   from_attribute: "service.name"
      # - action: delete
      #   key: service.name

  batch:
    timeout: 10s
    send_batch_size: 10000
    send_batch_max_size: 11000
  memory_limiter:
    check_interval: 1s
    limit_mib: 4000
    spike_limit_mib: 800

service:
  #extensions: [health_check]
  telemetry:
    logs:
      level: "info"  #debug, info,warn,error   
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: '0.0.0.0'
                port: 8888
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlp/aspire] #, logging, otlp/jaeger, ,otlp/newrelic, elasticsearch/traces
    logs:
      receivers: [otlp]
      processors: [ resource, batch] # ,resource
      exporters: [otlp/aspire] # loki, otlp/elastic, , otlp/newrelic, elasticsearch/logs
    metrics:
      receivers: [otlp]
      processors: [resource,  batch] #metricstransform/rename,
      exporters: [otlp/aspire] # , otlp/newrelic, prometheus,