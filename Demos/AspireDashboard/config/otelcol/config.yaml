receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256

  batch:
    timeout: 5s
    send_batch_size: 512

  filter/biz_metrics:
    error_mode: ignore
    metrics:
      metric:
        - 'not(IsMatch(name, "^biz\\..+"))'

  filter/app_metrics:
    error_mode: ignore
    metrics:
      metric:
        - 'IsMatch(name, "^biz\\..+")'

exporters:
  otlp/aspire:
    endpoint: aspire:18889
    tls:
      insecure: true

  prometheus:
    endpoint: 0.0.0.0:8889
    send_timestamps: true
    metric_expiration: 3m

  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/aspire]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/aspire]

    metrics/biz:
      receivers: [otlp]
      processors: [memory_limiter, filter/biz_metrics, batch]
      exporters: [prometheus]

    metrics/app:
      receivers: [otlp]
      processors: [memory_limiter, filter/app_metrics, batch]
      exporters: [otlp/aspire]

  telemetry:
    logs:
      level: warn
