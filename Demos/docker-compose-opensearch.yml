---
services:

  data-prepper:
    image: opensearchproject/data-prepper
    container_name: data-prepper
    volumes:
      - ./infra/config/dataprepper/metric_pipeline.yaml:/usr/share/data-prepper/pipelines/metric_pipeline.yaml
      - ./infra/config/dataprepper/data-prepper-config.yaml:/usr/share/data-prepper/config/data-prepper-config.yaml
      - ./infra/config/dataprepper/root-ca.pem:/usr/share/data-prepper/root-ca.pem
      - ./docker_data/datapreper/logs/log_pipeline.yaml:/usr/share/data-prepper/pipelines/
    ports:
      - 2021:2021
      - 21891:21891
      - 4900:4900
    expose:
      - "2021"
      - "4900"
      - "21891"
    depends_on:
      - opensearch
  
  opensearch:
    image: opensearchproject/opensearch:latest
    container_name: opensearch
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch
      - discovery.seed_hosts=opensearch
      - plugins.security.disabled=true
      - cluster.initial_cluster_manager_nodes=opensearch
      - bootstrap.memory_lock=true  # along with the memlock settings below, disables swapping
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m  # minimum and maximum Java heap size, recommend setting both to 50% of system RAM
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Developer@123    # Sets the demo admin user password when using demo configuration, required for OpenSearch 2.12 and higher
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536  # maximum number of open files for the OpenSearch user, set to at least 65536 on modern systems
        hard: 65536
    volumes:
      - opensearch-data1:/usr/share/opensearch/data
    ports:
      - 9200:9200
      - 9600:9600  # required for Performance Analyzer
 
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    container_name: opensearch-dashboards
    ports:
      - 5601:5601
    expose:
      - '5601'
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - "DISABLE_SECURITY_DASHBOARDS_PLUGIN=true"

  opensearch-init:
     image: curlimages/curl:latest
     depends_on:
       - opensearch
     entrypoint: >
       sh -c "
       sleep 20 &&
       curl -X PUT http://opensearch:9200/otel_logs -H 'Content-Type: application/json' -d '{\"settings\": {\"number_of_shards\": 1, \"number_of_replicas\": 0}} \' &&
       curl -X PUT http://opensearch:9200/otel_metrics -H 'Content-Type: application/json' -d '{\"settings\": {\"number_of_shards\": 1, \"number_of_replicas\": 0}} \' &&
       curl -X PUT http://opensearch:9200/otel_traces -H 'Content-Type: application/json' -d '{\"settings\": {\"number_of_shards\": 1, \"number_of_replicas\": 0}}\'  " 


volumes:
  opensearch-data1:



