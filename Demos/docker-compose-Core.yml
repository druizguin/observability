services:

  aspiredashboard:
     image: mcr.microsoft.com/dotnet/aspire-dashboard:latest
     ports:
       - "18888:18888" #UI
       - "18889:18889" #GRPC
     restart: always
     networks:
       - observability-net
     environment:
       - DOTNET_DASHBOARD_OTLP_GRPCENDPOINT=0.0.0.0:18889
       - ASPIRE_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS:true
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.74.0
    command: ["--config=/etc/otel/otel-collector-config.yaml"]
    container_name: otel-collector
    volumes:
      - ./Configuration:/etc/otel      
    environment:
      - ELASTIC_API_KEY=elasticsearch-apikey 
      - OTEL_EXPORTER_OTLP_HEADERS=api-key=eu01xxe66fa290a6436adb2d21e0883dFFFFNRAL

    ports:  
      - 8888:8888   # Prometheus metrics exposed by the collector    
      - 9464:9464   # Prometheus Metrics    
      - 4317:4317   # OTLP gRPC receiver
      - 4318:4318   # OTLP HTTP receiver
    depends_on:
      - aspiredashboard
      # - jaeger
      # - loki
      # - prometheus
      # - elasticsearch
    networks:
      - observability-net
    

